name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build & test tooling
        run: python -m pip install --upgrade pip maturin pytest

      - name: Build the Rust extension
        run: maturin build --release --out dist

      - name: Install the built wheel
        run: python -m pip install --no-index --find-links dist rcsp

      - name: Run tests
        run: pytest tests/ -v

      - name: Smoke-test the examples
        run: |
          python examples/e1_basic.py
          python examples/e2_timer_state.py
          python examples/e3_bid_ask.py
          python -c "import examples.e4_realtime as e; e.main(realtime=False)"
